serenity {
  project.name = "API Automation - Serenity BDD Screenplay"
  outputDirectory = "target/site/serenity"
  reports.show.step.details = true
  rest.displayRequestAndResponseDetails = true
}

restassured {
  enableLoggingOfRequestAndResponseIfValidationFails = true
  relaxedHTTPSValidation = true
}

environments {
  dev {
    jsonplaceholder.baseUrl = "https://jsonplaceholder.typicode.com"
    reqres.baseUrl = "https://reqres.in/api"
    petstore.baseUrl = "https://petstore.swagger.io/v2"
  }
  prod {
    jsonplaceholder.baseUrl = "https://jsonplaceholder.typicode.com"
    reqres.baseUrl = "https://reqres.in/api"
    petstore.baseUrl = "https://petstore.swagger.io/v2"
  }
}