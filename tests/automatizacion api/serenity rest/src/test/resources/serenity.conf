serenity {
  project.name = "Everest — Automatización API Grupo Aval"
  outputDirectory = "target/site/serenity"
  reports.show.step.details = true
  rest.displayRequestAndResponseDetails = true
}

restassured {
  enableLoggingOfRequestAndResponseIfValidationFails = true
  # Obligatorio en red NTT/corporativa (proxy MITM con certificado propio)
  relaxedHTTPSValidation = true
}

# ══════════════════════════════════════════════════════════════════════════════
# CONFIGURACIÓN DE AMBIENTES
# Para cambiar el apuntamiento de BD de TODAS las TX, editar únicamente
# el bloque del ambiente activo (seleccionado con -Denvironment=<env>).
# Variable principal de apuntamiento: db.url
# ══════════════════════════════════════════════════════════════════════════════
environments {
  # ── Desarrollo / Mock ─────────────────────────────────────────────────────
  dev {
    api.baseUrl  = "https://d2q3sea1wnkwiy.cloudfront.net"

    # ── Base de datos (db.url es la variable principal de apuntamiento) ──────
    db.url       = "jdbc:postgresql://localhost:5432/everest_dev"   # ← principal
    db.host      = "localhost"
    db.port      = "5432"
    db.name      = "everest_dev"
    db.user      = "db_user_dev"
    db.password  = "db_password_dev"
    db.schema    = "public"
  }
  # ── Staging / QA ─────────────────────────────────────────────────────────
  staging {
    api.baseUrl  = "https://d2q3sea1wnkwiy.cloudfront.net"

    # ── Base de datos (db.url es la variable principal de apuntamiento) ──────
    db.url       = "jdbc:postgresql://staging-db-host:5432/everest_staging"   # ← principal
    db.host      = "staging-db-host"
    db.port      = "5432"
    db.name      = "everest_staging"
    db.user      = "db_user_staging"
    db.password  = "db_password_staging"
    db.schema    = "public"
  }
  # ── Producción ───────────────────────────────────────────────────────────
  prod {
    api.baseUrl  = "https://d2q3sea1wnkwiy.cloudfront.net"

    # ── Base de datos (db.url es la variable principal de apuntamiento) ──────
    db.url       = "jdbc:postgresql://prod-db-host:5432/everest_prod"   # ← principal
    db.host      = "prod-db-host"
    db.port      = "5432"
    db.name      = "everest_prod"
    db.user      = "db_user_prod"
    db.password  = "db_password_prod"
    db.schema    = "public"
  }
}
